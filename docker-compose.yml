services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - game_test_server
      - game_obby_parkour
      - game_football
      - game_pet_simulator
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

  game_test_server:
    image: ghcr.io/iercann/notblox-game-server:latest
    environment:
      - GAME_SCRIPT=defaultScript.ts
      - GAME_TICKRATE=40 # Higher tickrate for vehicles
      - NODE_ENV=production
      - FRONTEND_URL=https://www.notblox.online
    expose:
      - '8001'
    restart: unless-stopped
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

  game_obby_parkour:
    image: ghcr.io/iercann/notblox-game-server:latest
    environment:
      - GAME_SCRIPT=parkourScript.ts
      - GAME_TICKRATE=20 # Default tickrate
      - NODE_ENV=production
      - FRONTEND_URL=https://www.notblox.online
    expose:
      - '8001'
    restart: unless-stopped
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

  game_football:
    image: ghcr.io/iercann/notblox-game-server:latest
    environment:
      - GAME_SCRIPT=footballScript.ts
      - GAME_TICKRATE=20
      - NODE_ENV=production
      - FRONTEND_URL=https://www.notblox.online
    expose:
      - '8001'
    restart: unless-stopped
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

  game_pet_simulator:
    image: ghcr.io/iercann/notblox-game-server:latest
    environment:
      - GAME_SCRIPT=petSimulatorScript.ts
      - GAME_TICKRATE=20
      - NODE_ENV=production
      - FRONTEND_URL=https://www.notblox.online
    expose:
      - '8001'
    restart: unless-stopped
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

  monitor-logs:
    build: ./monitor
    environment:
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL}
      - CHECK_INTERVAL=10000
    restart: 'no'
    depends_on:
      - game_test_server
      - game_obby_parkour
      - game_football
      - game_pet_simulator
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

volumes:
  caddy_data:
  caddy_config:
